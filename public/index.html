<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Live Interpreter · English ⇄ Vietnamese</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel-2: #1e222d;
    --ink: #e8eaf0; --muted: #8b93a7; --line: #2a2f3d;
    --accent: #4f8cff; --accent-ink: #fff;
    --live: #ff4d6d; --ok: #2fd07a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 1.02rem; margin: 0; font-weight: 700; letter-spacing: .2px; }
  header .sub { font-size: .74rem; color: var(--muted); margin-top: 2px; }
  .status { display: flex; align-items: center; gap: 7px; font-size: .76rem; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.connecting { background: var(--accent); animation: pulse 1s infinite; }
  .dot.live { background: var(--live); animation: pulse 1s infinite; }
  .dot.ready { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .direction {
    display: flex; align-items: center; gap: 10px; margin: 16px 18px 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px;
  }
  .lang { flex: 1; text-align: center; transition: opacity .2s; }
  .lang.dim { opacity: .38; }
  .lang .flag { font-size: 1.5rem; line-height: 1; }
  .lang .name { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .arrow { font-size: 1.15rem; color: var(--accent); flex: none; }
  .autobadge {
    position: absolute; margin-top: -8px; margin-left: 14px;
    font-size: .58rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); background: var(--bg); padding: 0 6px;
  }

  main { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; overflow: hidden; }
  .track { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; min-height: 0; }
  .track.src { flex: 1; }
  .track.dst { flex: 1.15; border-color: #2f3a55; }
  .track h2 { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; display: flex; align-items: center; gap: 6px; }
  .track.dst h2 { color: var(--accent); }
  .transcript { flex: 1; overflow-y: auto; font-size: 1.12rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .track.dst .transcript { font-size: 1.28rem; font-weight: 500; }
  .transcript:empty::before { content: attr(data-placeholder); color: var(--muted); font-size: .95rem; font-weight: 400; }
  .interim { color: var(--muted); }

  footer { padding: 14px 18px calc(18px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .controls { display: flex; gap: 10px; }
  .mic {
    flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 1.02rem; font-weight: 700;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .15s;
  }
  .mic:disabled { opacity: .55; cursor: default; }
  .mic.recording { background: var(--live); }
  .mic .ico { font-size: 1.2rem; }
  .toggle {
    flex: none; width: 58px; border: 1px solid var(--line); border-radius: 14px;
    background: var(--panel-2); color: var(--ink); font-size: 1.3rem; cursor: pointer;
  }
  .toggle.off { opacity: .55; }
  .hint { text-align: center; font-size: .72rem; color: var(--muted); margin-top: 10px; }
  .error { color: var(--live); }
  audio { display: none; }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Live Interpreter</h1>
      <div class="sub">English ⇄ Vietnamese · auto-detect</div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Idle</span></div>
  </header>

  <div class="direction" id="direction">
    <span class="autobadge">Auto</span>
    <div class="lang" id="langFrom">
      <div class="flag" id="fromFlag">🎧</div>
      <div class="name" id="fromName">Listening…</div>
    </div>
    <div class="arrow">→</div>
    <div class="lang" id="langTo">
      <div class="flag" id="toFlag">🌐</div>
      <div class="name" id="toName">translation</div>
    </div>
  </div>

  <main>
    <section class="track src">
      <h2>🎙️ <span id="srcLabel">You said</span></h2>
      <div class="transcript" id="srcText" data-placeholder="Speak English or Vietnamese — it detects automatically…"></div>
    </section>
    <section class="track dst">
      <h2>🔊 <span id="dstLabel">Translation</span></h2>
      <div class="transcript" id="dstText" data-placeholder="The translation appears here (and is spoken aloud)…"></div>
    </section>
  </main>

  <footer>
    <div class="controls">
      <button class="mic" id="mic"><span class="ico">🎙️</span><span id="micText">Start interpreting</span></button>
      <button class="toggle" id="audioToggle" title="Voice on/off">🔊</button>
    </div>
    <div class="hint" id="hint">Tap to grant microphone access. Speak either language.</div>
  </footer>

  <!-- One audio element per direction; we unmute only the one that matches what was spoken. -->
  <audio id="audioVI" autoplay></audio>
  <audio id="audioEN" autoplay></audio>

<script>
(() => {
  const LANGS = {
    en: { flag: "🇬🇧", name: "English" },
    vi: { flag: "🇻🇳", name: "Vietnamese" },
  };
  // Vietnamese-specific letters/diacritics — their presence => Vietnamese was spoken.
  const VI_CHARS = /[ăâđêôơưĂÂĐÊÔƠƯàáảãạằắẳẵặầấẩẫậèéẻẽẹềếểễệìíỉĩịòóỏõọồốổỗộờớởỡợùúủũụ​ừứửữựỳýỷỹỵ]/;
  const detectLang = (t) => (VI_CHARS.test(t) ? "vi" : "en");

  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusText = $("statusText");
  const micBtn = $("mic"), micText = $("micText"), hint = $("hint");
  const srcText = $("srcText"), dstText = $("dstText");
  const audioVI = $("audioVI"), audioEN = $("audioEN");
  const audioToggle = $("audioToggle");

  let running = false;
  let playAudio = true;
  let sessions = [];        // [{pc, dc, to}]
  let micStream = null;
  let activeOut = "vi";     // which session's output we currently play/show ("vi" or "en")
  let srcBuf = "", dstBuf = "";

  function setStatus(state, text) { dot.className = "dot" + (state ? " " + state : ""); statusText.textContent = text; }

  function applyMute() {
    audioVI.muted = !(running && playAudio && activeOut === "vi");
    audioEN.muted = !(running && playAudio && activeOut === "en");
  }

  function updateDetectedUI(spoken) {
    const to = spoken === "en" ? "vi" : "en";
    $("fromFlag").textContent = LANGS[spoken].flag;
    $("fromName").textContent = LANGS[spoken].name;
    $("toFlag").textContent = LANGS[to].flag;
    $("toName").textContent = LANGS[to].name;
    $("langFrom").classList.remove("dim");
    $("langTo").classList.remove("dim");
    $("srcLabel").textContent = "You said (" + LANGS[spoken].name + ")";
    $("dstLabel").textContent = "Translation (" + LANGS[to].name + ")";
  }

  function resetDetectedUI() {
    $("fromFlag").textContent = "🎧"; $("fromName").textContent = "Listening…";
    $("toFlag").textContent = "🌐"; $("toName").textContent = "translation";
    $("langFrom").classList.add("dim"); $("langTo").classList.add("dim");
    $("srcLabel").textContent = "You said"; $("dstLabel").textContent = "Translation";
  }

  audioToggle.addEventListener("click", () => {
    playAudio = !playAudio;
    audioToggle.textContent = playAudio ? "🔊" : "🔇";
    audioToggle.classList.toggle("off", !playAudio);
    audioToggle.title = playAudio ? "Voice on — tap for transcript only" : "Transcript only — tap for voice";
    applyMute();
  });

  micBtn.addEventListener("click", () => (running ? stop() : start()));

  // Open ONE translation session with a fixed output language.
  async function openSession(to, stream) {
    const res = await fetch("/api/session?to=" + to, { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Session request failed");

    const pc = new RTCPeerConnection();
    const audioEl = to === "vi" ? audioVI : audioEN;
    pc.ontrack = ({ streams }) => { audioEl.srcObject = streams[0]; applyMute(); };

    const dc = pc.createDataChannel("oai-events");
    dc.onmessage = (e) => { let m; try { m = JSON.parse(e.data); } catch { return; } handleEvent(to, m); };

    stream.getAudioTracks().forEach((t) => pc.addTrack(t, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    const sdp = await fetch("https://api.openai.com/v1/realtime/translations/calls", {
      method: "POST",
      headers: { Authorization: "Bearer " + data.client_secret, "Content-Type": "application/sdp" },
      body: offer.sdp,
    });
    if (!sdp.ok) throw new Error("OpenAI handshake failed (" + sdp.status + ")");
    await pc.setRemoteDescription({ type: "answer", sdp: await sdp.text() });
    return { pc, dc, to };
  }

  async function start() {
    try {
      srcBuf = ""; dstBuf = ""; srcText.textContent = ""; dstText.textContent = "";
      resetDetectedUI();
      setStatus("connecting", "Connecting…");
      micBtn.disabled = true; micText.textContent = "Connecting…";
      hint.classList.remove("error");

      // noiseSuppression OFF: it treats a phone speaker held near the laptop
      // as "noise" and mutes it. autoGainControl ON helps amplify quiet/distant
      // audio. echoCancellation ON prevents the translated output from looping
      // back into the mic (use headphones for best results).
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: true,
        },
      });

      // Two sessions: one that outputs Vietnamese (for English speech),
      // one that outputs English (for Vietnamese speech). Same mic feeds both.
      sessions = await Promise.all([
        openSession("vi", micStream),
        openSession("en", micStream),
      ]);

      running = true;
      applyMute();
      micBtn.disabled = false;
      micBtn.classList.add("recording");
      micText.textContent = "Stop";
      hint.textContent = "Listening… speak English or Vietnamese.";
      setStatus("live", "Live · auto");
    } catch (err) {
      console.error(err);
      hint.textContent = "Error: " + err.message;
      hint.classList.add("error");
      setStatus("", "Error");
      micBtn.disabled = false; micText.textContent = "Start interpreting";
      await stop();
    }
  }

  async function stop() {
    running = false;
    micBtn.classList.remove("recording");
    micText.textContent = "Start interpreting";
    if (!hint.classList.contains("error")) hint.textContent = "Stopped.";
    setStatus("ready", "Ready");
    for (const s of sessions) { try { s.dc.close(); } catch {} try { s.pc.close(); } catch {} }
    sessions = [];
    if (micStream) micStream.getTracks().forEach((t) => t.stop());
    micStream = null;
    applyMute();
  }

  // Only the "vi" session drives the source transcript + language detection
  // (both sessions transcribe the same audio, so we pick one to avoid doubles).
  function handleEvent(to, msg) {
    switch (msg.type) {
      case "session.input_transcript.delta":
        if (to !== "vi") break;
        srcBuf += msg.delta || "";
        srcText.textContent = srcBuf;
        srcText.scrollTop = srcText.scrollHeight;
        {
          const spoken = detectLang(srcBuf);
          activeOut = spoken === "en" ? "vi" : "en";
          updateDetectedUI(spoken);
          applyMute();
        }
        break;
      case "session.input_transcript.done":
        if (to !== "vi") break;
        srcBuf += "\n";
        break;
      case "session.output_transcript.delta":
        if (to !== activeOut) break; // ignore the "echo" session going the wrong way
        dstBuf += msg.delta || "";
        dstText.textContent = dstBuf;
        dstText.scrollTop = dstText.scrollHeight;
        break;
      case "session.output_transcript.done":
        if (to === activeOut) dstBuf += "\n";
        break;
      case "error":
        console.error("Realtime error:", msg);
        hint.textContent = "Error: " + (msg.error?.message || "realtime error");
        hint.classList.add("error");
        break;
      default:
        break;
    }
  }

  resetDetectedUI();
  setStatus("ready", "Ready");
})();
</script>
</body>
</html>
