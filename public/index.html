<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Live Interpreter · English ⇄ Vietnamese</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel-2: #1e222d;
    --ink: #e8eaf0; --muted: #8b93a7; --line: #2a2f3d;
    --accent: #4f8cff; --accent-ink: #fff;
    --live: #ff4d6d; --ok: #2fd07a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 1.02rem; margin: 0; font-weight: 700; letter-spacing: .2px; }
  header .sub { font-size: .74rem; color: var(--muted); margin-top: 2px; }
  .status { display: flex; align-items: center; gap: 7px; font-size: .76rem; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.connecting { background: var(--accent); animation: pulse 1s infinite; }
  .dot.live { background: var(--live); animation: pulse 1s infinite; }
  .dot.ready { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .engine { display: flex; gap: 6px; margin: 14px 18px 0; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 4px; }
  .eng { flex: 1; padding: 8px 6px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-size: .82rem; font-weight: 600; cursor: pointer; }
  .eng.active { background: var(--accent); color: #fff; }
  .eng small { display: block; font-size: .62rem; font-weight: 500; opacity: .8; margin-top: 1px; }

  .direction {
    display: flex; align-items: stretch; gap: 0; margin: 10px 18px 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
  }
  .lang { flex: 1; text-align: center; padding: 12px 8px; }
  .lang .flag { font-size: 1.5rem; line-height: 1; }
  .lang .name { font-size: .82rem; margin-top: 4px; font-weight: 600; }
  .lang .role { font-size: .62rem; text-transform: uppercase; letter-spacing: .8px; margin-top: 3px; color: var(--muted); font-weight: 700; }
  .lang.input .role { color: var(--live); }
  .lang.output .role { color: var(--accent); }
  .swap {
    flex: none; width: 56px; border: none; background: var(--panel-2); color: var(--ink);
    font-size: 1.25rem; cursor: pointer; border-left: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .swap:active { background: var(--accent); color: #fff; }

  main { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 14px 18px; overflow: hidden; }
  .track { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; min-height: 0; }
  .track.src { flex: 1; }
  .track.dst { flex: 1.15; border-color: #2f3a55; }
  .track h2 { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; display: flex; align-items: center; gap: 6px; }
  .track.dst h2 { color: var(--accent); }
  .transcript { flex: 1; overflow-y: auto; font-size: 1.12rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .track.dst .transcript { font-size: 1.28rem; font-weight: 500; }
  .transcript:empty::before { content: attr(data-placeholder); color: var(--muted); font-size: .95rem; font-weight: 400; }

  footer { padding: 14px 18px calc(18px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .controls { display: flex; gap: 10px; }
  .mic {
    flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 1.02rem; font-weight: 700;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .15s;
  }
  .mic:disabled { opacity: .55; cursor: default; }
  .mic.recording { background: var(--live); }
  .mic .ico { font-size: 1.2rem; }
  .toggle {
    flex: none; width: 58px; border: 1px solid var(--line); border-radius: 14px;
    background: var(--panel-2); color: var(--ink); font-size: 1.3rem; cursor: pointer;
  }
  .toggle.off { opacity: .55; }
  .hint { text-align: center; font-size: .72rem; color: var(--muted); margin-top: 10px; }
  .error { color: var(--live); }
  audio { display: none; }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Live Interpreter</h1>
      <div class="sub" id="sub">English ⇄ Vietnamese</div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Idle</span></div>
  </header>

  <div class="engine" id="engine">
    <button class="eng active" data-engine="translate">Reliable<small>never chats</small></button>
    <button class="eng" data-engine="pro">Higher quality<small>may rarely slip</small></button>
  </div>

  <div class="direction" id="direction">
    <div class="lang input" id="langFrom">
      <div class="flag" id="fromFlag">🇻🇳</div>
      <div class="name" id="fromName">Vietnamese</div>
      <div class="role">Speaking</div>
    </div>
    <button class="swap" id="swap" title="Swap direction">⇄</button>
    <div class="lang output" id="langTo">
      <div class="flag" id="toFlag">🇬🇧</div>
      <div class="name" id="toName">English</div>
      <div class="role">Translation</div>
    </div>
  </div>

  <main>
    <section class="track src">
      <h2>🎙️ <span id="srcLabel">You said</span></h2>
      <div class="transcript" id="srcText" data-placeholder="What the speaker says appears here…"></div>
    </section>
    <section class="track dst">
      <h2>🔊 <span id="dstLabel">Translation</span></h2>
      <div class="transcript" id="dstText" data-placeholder="The translation appears here (and is spoken aloud)…"></div>
    </section>
  </main>

  <footer>
    <div class="controls">
      <button class="mic" id="mic"><span class="ico">🎙️</span><span id="micText">Start interpreting</span></button>
      <button class="toggle" id="audioToggle" title="Voice on/off">🔊</button>
    </div>
    <div class="hint" id="hint">Pick an engine + direction, then tap to start.</div>
  </footer>

  <audio id="remoteAudio" autoplay></audio>

<script>
(() => {
  const LANGS = {
    en: { flag: "🇬🇧", name: "English" },
    vi: { flag: "🇻🇳", name: "Vietnamese" },
  };

  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusText = $("statusText");
  const micBtn = $("mic"), micText = $("micText"), hint = $("hint");
  const srcText = $("srcText"), dstText = $("dstText");
  const remoteAudio = $("remoteAudio"), audioToggle = $("audioToggle");

  let engine = "translate";       // "translate" | "pro"
  let from = "vi", to = "en";
  let running = false, playAudio = true;
  let pc = null, dc = null, micStream = null;
  let srcBuf = "", dstBuf = "", srcSegHasDelta = false;

  const setStatus = (state, text) => { dot.className = "dot" + (state ? " " + state : ""); statusText.textContent = text; };

  function renderDirection() {
    $("fromFlag").textContent = LANGS[from].flag; $("fromName").textContent = LANGS[from].name;
    $("toFlag").textContent = LANGS[to].flag;     $("toName").textContent = LANGS[to].name;
    $("srcLabel").textContent = "You said (" + LANGS[from].name + ")";
    $("dstLabel").textContent = "Translation (" + LANGS[to].name + ")";
    $("sub").textContent = "English ⇄ Vietnamese · " + (engine === "pro" ? "gpt-realtime-2" : "gpt-realtime-translate");
  }

  async function reconnectIfRunning() {
    if (running) { setStatus("connecting", "Switching…"); await stop(true); await start(); }
  }

  document.querySelectorAll(".eng").forEach((b) => b.addEventListener("click", async () => {
    engine = b.dataset.engine;
    document.querySelectorAll(".eng").forEach((x) => x.classList.toggle("active", x === b));
    renderDirection();
    await reconnectIfRunning();
  }));

  $("swap").addEventListener("click", async () => {
    [from, to] = [to, from];
    renderDirection();
    await reconnectIfRunning();
  });

  audioToggle.addEventListener("click", () => {
    playAudio = !playAudio;
    remoteAudio.muted = !playAudio;
    audioToggle.textContent = playAudio ? "🔊" : "🔇";
    audioToggle.classList.toggle("off", !playAudio);
  });

  micBtn.addEventListener("click", () => (running ? stop() : start()));

  async function start() {
    try {
      srcBuf = ""; dstBuf = ""; srcText.textContent = ""; dstText.textContent = ""; srcSegHasDelta = false;
      setStatus("connecting", "Connecting…");
      micBtn.disabled = true; micText.textContent = "Connecting…";
      hint.classList.remove("error");

      const res = await fetch("/api/session?engine=" + engine + "&from=" + from + "&to=" + to, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Session request failed");
      const clientSecret = data.client_secret;
      const isPro = data.engine === "pro";

      pc = new RTCPeerConnection();
      pc.ontrack = ({ streams }) => { remoteAudio.srcObject = streams[0]; remoteAudio.muted = !playAudio; };
      dc = pc.createDataChannel("oai-events");
      dc.onmessage = (e) => { let m; try { m = JSON.parse(e.data); } catch { return; } handleEvent(m); };
      if (isPro) {
        dc.onopen = () => dc.send(JSON.stringify({
          type: "session.update",
          session: { type: "realtime", audio: { input: { transcription: { model: "gpt-realtime-whisper" } } } },
        }));
      }

      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
      micStream.getAudioTracks().forEach((t) => pc.addTrack(t, micStream));

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      const sdpUrl = isPro
        ? "https://api.openai.com/v1/realtime/calls?model=" + encodeURIComponent(data.model || "gpt-realtime-2")
        : "https://api.openai.com/v1/realtime/translations/calls";
      const sdpRes = await fetch(sdpUrl, {
        method: "POST",
        headers: { Authorization: "Bearer " + clientSecret, "Content-Type": "application/sdp" },
        body: offer.sdp,
      });
      if (!sdpRes.ok) throw new Error("OpenAI handshake failed (" + sdpRes.status + ")");
      await pc.setRemoteDescription({ type: "answer", sdp: await sdpRes.text() });

      running = true;
      micBtn.disabled = false; micBtn.classList.add("recording"); micText.textContent = "Stop";
      hint.textContent = "Listening… speak " + LANGS[from].name + ".";
      setStatus("live", LANGS[from].name + " → " + LANGS[to].name);
    } catch (err) {
      console.error(err);
      hint.textContent = "Error: " + err.message; hint.classList.add("error");
      setStatus("", "Error");
      micBtn.disabled = false; micText.textContent = "Start interpreting";
      await stop(true);
    }
  }

  async function stop(quiet) {
    running = false;
    micBtn.classList.remove("recording");
    if (!quiet) {
      micText.textContent = "Start interpreting";
      if (!hint.classList.contains("error")) hint.textContent = "Stopped.";
      setStatus("ready", "Ready");
    }
    try { dc && dc.close(); } catch {}
    try { pc && pc.close(); } catch {}
    if (micStream) micStream.getTracks().forEach((t) => t.stop());
    dc = null; pc = null; micStream = null;
  }

  // Handles BOTH engines' event schemas (names don't collide).
  function handleEvent(msg) {
    const t = msg.type || "";
    // Input transcript — translate engine
    if (t === "session.input_transcript.delta") { appendSrc(msg.delta); }
    else if (t === "session.input_transcript.done") { finishSrc(msg.transcript); }
    // Input transcript — pro engine
    else if (t === "conversation.item.input_audio_transcription.delta") { appendSrc(msg.delta); }
    else if (t === "conversation.item.input_audio_transcription.completed") { finishSrc(msg.transcript); }
    // Output transcript — translate engine
    else if (t === "session.output_transcript.delta") { appendDst(msg.delta); }
    else if (t === "session.output_transcript.done") { dstBuf += "\n"; }
    // Output transcript — pro engine
    else if (t === "response.output_audio_transcript.delta" || t === "response.audio_transcript.delta") { appendDst(msg.delta); }
    else if (t === "response.output_audio_transcript.done" || t === "response.audio_transcript.done") { dstBuf += "\n"; }
    // Errors
    else if (t === "error") {
      console.error("Realtime error:", msg);
      hint.textContent = "Error: " + (msg.error?.message || "realtime error"); hint.classList.add("error");
    }
  }

  function appendSrc(delta) {
    srcSegHasDelta = true; srcBuf += delta || "";
    srcText.textContent = srcBuf; srcText.scrollTop = srcText.scrollHeight;
  }
  function finishSrc(transcript) {
    if (!srcSegHasDelta && transcript) { srcBuf += transcript; srcText.textContent = srcBuf; }
    srcBuf += "\n"; srcSegHasDelta = false;
  }
  function appendDst(delta) {
    dstBuf += delta || "";
    dstText.textContent = dstBuf; dstText.scrollTop = dstText.scrollHeight;
  }

  renderDirection();
  setStatus("ready", "Ready");
})();
</script>
</body>
</html>
