<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Live Interpreter · English ⇄ Vietnamese</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel-2: #1e222d;
    --ink: #e8eaf0; --muted: #8b93a7; --line: #2a2f3d;
    --accent: #4f8cff; --accent-ink: #fff; --live: #ff4d6d; --ok: #2fd07a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100vh; }
  header { padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  header h1 { font-size: 1.02rem; margin: 0; font-weight: 700; }
  header .sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .status { display: flex; align-items: center; gap: 7px; font-size: .76rem; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.connecting { background: var(--accent); animation: pulse 1s infinite; }
  .dot.live { background: var(--live); animation: pulse 1s infinite; }
  .dot.ready { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .direction { display: flex; align-items: stretch; margin: 16px 18px 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  .lang { flex: 1; text-align: center; padding: 12px 8px; }
  .lang .flag { font-size: 1.5rem; line-height: 1; }
  .lang .name { font-size: .82rem; margin-top: 4px; font-weight: 600; }
  .lang .role { font-size: .62rem; text-transform: uppercase; letter-spacing: .8px; margin-top: 3px; font-weight: 700; color: var(--muted); }
  .lang.input .role { color: var(--live); } .lang.output .role { color: var(--accent); }
  .swap { flex: none; width: 56px; border: none; background: var(--panel-2); color: var(--ink);
    font-size: 1.25rem; cursor: pointer; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  .swap:active { background: var(--accent); color: #fff; }

  .modechip { display: block; margin: 10px 18px 0; padding: 9px; border: 1px solid var(--line);
    border-radius: 12px; background: var(--panel-2); color: var(--muted); font-size: .8rem; font-weight: 600;
    cursor: pointer; text-align: center; width: auto; }
  .modechip.on { background: rgba(79,140,255,.16); border-color: var(--accent); color: var(--accent); }

  main { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; overflow: hidden; }
  .track { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; min-height: 0; }
  .track.src { flex: 1; } .track.dst { flex: 1.15; border-color: #2f3a55; }
  .track h2 { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }
  .track.dst h2 { color: var(--accent); }
  .transcript { flex: 1; overflow-y: auto; font-size: 1.12rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .track.dst .transcript { font-size: 1.26rem; font-weight: 500; }
  .transcript:empty::before { content: attr(data-placeholder); color: var(--muted); font-size: .95rem; font-weight: 400; }
  .transcript.err { color: var(--live); font-weight: 600; }
  .meter { height: 4px; background: var(--panel-2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .meter > span { display: block; height: 100%; width: 0%; background: var(--live); transition: width .06s; }

  footer { padding: 14px 18px calc(18px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .controls { display: flex; gap: 10px; }
  .mic { flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 1.02rem; font-weight: 700;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .mic:disabled { opacity: .55; cursor: default; }
  .mic.recording { background: var(--live); }
  .toggle { flex: none; width: 58px; border: 1px solid var(--line); border-radius: 14px; background: var(--panel-2); color: var(--ink); font-size: 1.3rem; cursor: pointer; }
  .toggle.off { opacity: .55; }
  .hint { text-align: center; font-size: .72rem; color: var(--muted); margin-top: 10px; }
  .hint.error { color: var(--live); }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Live Interpreter</h1>
      <div class="sub">English ⇄ Vietnamese · Gemini Live Translate</div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Idle</span></div>
  </header>

  <div class="direction" id="direction">
    <div class="lang input" id="langFrom">
      <div class="flag" id="fromFlag">🇻🇳</div><div class="name" id="fromName">Vietnamese</div><div class="role">Speaking</div>
    </div>
    <button class="swap" id="swap" title="Swap direction">⇄</button>
    <div class="lang output" id="langTo">
      <div class="flag" id="toFlag">🇬🇧</div><div class="name" id="toName">English</div><div class="role">Translation</div>
    </div>
  </div>

  <button class="modechip" id="phoneMode">📞 Phone-call mode: Off</button>

  <main>
    <section class="track src">
      <h2>🎙️ <span id="srcLabel">You said</span></h2>
      <div class="transcript" id="srcText" data-placeholder="Speak — your words appear here as you talk…"></div>
      <div class="meter"><span id="meterBar"></span></div>
    </section>
    <section class="track dst">
      <h2>🔊 <span id="dstLabel">Translation</span></h2>
      <div class="transcript" id="dstText" data-placeholder="The translation streams here and is spoken aloud…"></div>
    </section>
  </main>

  <footer>
    <div class="controls">
      <button class="mic" id="mic">🎙️ <span id="micText">Start</span></button>
      <button class="toggle" id="audioToggle" title="Voice on/off">🔊</button>
    </div>
    <div class="hint" id="hint">Set the direction, tap Start, and speak.</div>
  </footer>

<script>
(() => {
  const LANGS = { en: { flag: "🇬🇧", name: "English" }, vi: { flag: "🇻🇳", name: "Vietnamese" } };
  const WS_BASE = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained";

  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusText = $("statusText"), hint = $("hint");
  const micBtn = $("mic"), micText = $("micText"), audioToggle = $("audioToggle");
  const srcText = $("srcText"), dstText = $("dstText"), meterBar = $("meterBar");

  let from = "vi", to = "en";
  let running = false, playAudio = true, phoneMode = false;
  let ws = null, micStream = null;
  let inCtx = null, proc = null, silentGain = null;
  let outCtx = null, outGain = null, nextStart = 0;
  let setupDone = false;

  const setStatus = (s, t) => { dot.className = "dot" + (s ? " " + s : ""); statusText.textContent = t; };

  function renderDirection() {
    $("fromFlag").textContent = LANGS[from].flag; $("fromName").textContent = LANGS[from].name;
    $("toFlag").textContent = LANGS[to].flag; $("toName").textContent = LANGS[to].name;
    $("srcLabel").textContent = "You said (" + LANGS[from].name + ")";
    $("dstLabel").textContent = "Translation (" + LANGS[to].name + ")";
  }

  $("swap").addEventListener("click", async () => {
    [from, to] = [to, from]; renderDirection();
    if (running) { setStatus("connecting", "Switching…"); await stop(true); await start(); }
  });
  audioToggle.addEventListener("click", () => {
    playAudio = !playAudio;
    if (outGain) outGain.gain.value = playAudio ? 1 : 0;
    audioToggle.textContent = playAudio ? "🔊" : "🔇"; audioToggle.classList.toggle("off", !playAudio);
  });

  const phoneBtn = $("phoneMode");
  function updatePhoneBtn() {
    phoneBtn.textContent = "📞 Phone-call mode: " + (phoneMode ? "On" : "Off");
    phoneBtn.classList.toggle("on", phoneMode);
  }
  phoneBtn.addEventListener("click", async () => {
    phoneMode = !phoneMode; updatePhoneBtn();
    hint.textContent = phoneMode
      ? "Phone-call mode: point the other phone's speaker at this mic. Tip: use 🔇 and read."
      : "Direct mode: speak into this phone.";
    hint.classList.remove("error");
    if (running) { setStatus("connecting", "Switching…"); await stop(true); await start(); }
  });

  // Mic settings: normal = clean for speaking directly; phone mode = capture a
  // nearby phone's speaker (suppression off so the relayed audio isn't filtered).
  function micConstraints() {
    return phoneMode
      ? { echoCancellation: false, noiseSuppression: false, autoGainControl: true }
      : { echoCancellation: true, noiseSuppression: true, autoGainControl: true };
  }

  micBtn.addEventListener("click", () => (running ? stop() : start()));

  function showError(msg) {
    dstText.classList.add("err"); dstText.textContent = "⚠ " + msg;
    hint.textContent = "Error: " + msg; hint.classList.add("error");
    setStatus("", "Error");
  }

  // ---- base64 <-> bytes / PCM helpers ----
  function b64FromBytes(bytes) {
    let bin = ""; const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    return btoa(bin);
  }
  function bytesFromB64(b64) {
    const bin = atob(b64); const u = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
    return u;
  }
  function f32ToPCM16(f32) {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) { let s = Math.max(-1, Math.min(1, f32[i])); i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff; }
    return i16;
  }

  async function start() {
    try {
      srcText.textContent = ""; dstText.textContent = ""; dstText.classList.remove("err");
      hint.classList.remove("error"); setupDone = false;
      setStatus("connecting", "Connecting…"); micBtn.disabled = true; micText.textContent = "Connecting…";

      // 1. Ephemeral token from our server.
      const res = await fetch("/api/token", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "token request failed");
      const model = data.model || "gemini-3.5-live-translate-preview";

      // 2. Audio contexts (input 16kHz, output 24kHz). Created on the Start tap so iOS allows them.
      inCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      outCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
      await inCtx.resume(); await outCtx.resume();
      outGain = outCtx.createGain(); outGain.gain.value = playAudio ? 1 : 0; outGain.connect(outCtx.destination);
      nextStart = 0;

      // 3. Open the Live API WebSocket with the token.
      ws = new WebSocket(WS_BASE + "?access_token=" + encodeURIComponent(data.token));
      ws.onopen = () => {
        ws.send(JSON.stringify({
          setup: {
            model: "models/" + model,
            generationConfig: {
              responseModalities: ["AUDIO"],
              translationConfig: { targetLanguageCode: to, echoTargetLanguage: false },
            },
            inputAudioTranscription: {},
            outputAudioTranscription: {},
          },
        }));
      };
      ws.onmessage = onWsMessage;
      // Browsers hide WebSocket error detail; the CLOSE event carries the real
      // code/reason (auth, quota, etc.), so prefer that.
      ws.onerror = () => { if (running && !setupDone) showError("connection error (waiting for close reason…)"); };
      ws.onclose = (e) => {
        if (!running) return;
        const why = e.reason ? " — " + e.reason : (e.code === 1006 ? " — abnormal (often quota/rate limit, token expiry, or too many sessions at once)" : "");
        showError("connection closed [" + (e.code || "?") + "]" + why);
      };

      // 4. Mic capture -> 16kHz PCM16 -> WebSocket.
      micStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints() });
      const srcNode = inCtx.createMediaStreamSource(micStream);
      proc = inCtx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== 1 || !setupDone) return;
        const f32 = e.inputBuffer.getChannelData(0);
        let sum = 0; for (let i = 0; i < f32.length; i++) sum += f32[i] * f32[i];
        meterBar.style.width = Math.min(100, Math.sqrt(sum / f32.length) * 400) + "%";
        const pcm = f32ToPCM16(f32);
        ws.send(JSON.stringify({ realtimeInput: { audio: { mimeType: "audio/pcm;rate=16000", data: b64FromBytes(new Uint8Array(pcm.buffer)) } } }));
      };
      silentGain = inCtx.createGain(); silentGain.gain.value = 0;   // keep processor alive without echoing mic
      srcNode.connect(proc); proc.connect(silentGain); silentGain.connect(inCtx.destination);

      running = true;
      micBtn.disabled = false; micBtn.classList.add("recording"); micText.textContent = "Stop";
      setStatus("live", LANGS[from].name + " → " + LANGS[to].name);
      hint.textContent = "Listening… speak " + LANGS[from].name + ".";
    } catch (err) {
      console.error(err);
      showError(err.message || String(err));
      micBtn.disabled = false; micText.textContent = "Start";
      await stop(true);
    }
  }

  async function stop(quiet) {
    running = false; setupDone = false;
    try { if (proc) proc.onaudioprocess = null; } catch {}
    try { ws && ws.close(); } catch {}
    try { if (micStream) micStream.getTracks().forEach((t) => t.stop()); } catch {}
    try { if (inCtx) inCtx.close(); } catch {}
    try { if (outCtx) outCtx.close(); } catch {}
    ws = null; micStream = null; inCtx = null; outCtx = null; proc = null; outGain = null;
    micBtn.classList.remove("recording"); micText.textContent = "Start"; meterBar.style.width = "0%";
    if (!quiet) { setStatus("ready", "Ready"); if (!hint.classList.contains("error")) hint.textContent = "Stopped."; }
  }

  async function onWsMessage(ev) {
    let raw = ev.data;
    if (raw instanceof Blob) raw = await raw.text();
    let msg; try { msg = JSON.parse(raw); } catch { return; }

    if (msg.setupComplete) { setupDone = true; return; }
    if (msg.error) { showError(msg.error.message || JSON.stringify(msg.error)); return; }

    const sc = msg.serverContent;
    if (!sc) return;
    if (sc.inputTranscription && sc.inputTranscription.text) {
      srcText.textContent += sc.inputTranscription.text; srcText.scrollTop = srcText.scrollHeight;
    }
    if (sc.outputTranscription && sc.outputTranscription.text) {
      dstText.textContent += sc.outputTranscription.text; dstText.scrollTop = dstText.scrollHeight;
    }
    const parts = (sc.modelTurn && sc.modelTurn.parts) || [];
    for (const p of parts) {
      if (p.inlineData && p.inlineData.data) playPCM(p.inlineData.data);
      else if (p.text) { dstText.textContent += p.text; dstText.scrollTop = dstText.scrollHeight; }
    }
  }

  // Play a 24kHz PCM16 chunk, scheduled back-to-back for gapless audio.
  function playPCM(b64) {
    if (!outCtx) return;
    const u = bytesFromB64(b64);
    const len = u.length - (u.length % 2);
    const i16 = new Int16Array(u.buffer, 0, len / 2);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 0x8000;
    const buf = outCtx.createBuffer(1, f32.length, 24000);
    buf.copyToChannel(f32, 0);
    const node = outCtx.createBufferSource();
    node.buffer = buf; node.connect(outGain);
    const t = Math.max(outCtx.currentTime + 0.02, nextStart);
    node.start(t); nextStart = t + buf.duration;
  }

  renderDirection();
  setStatus("ready", "Ready");
})();
</script>
</body>
</html>
